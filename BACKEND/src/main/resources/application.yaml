server:
  port: 8080
  servlet:
    context-path: /real-estate
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/real_estate_db
    username: root
    password: ${DB_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      connection-timeout: 5000
  mail:
    host: smtp.gmail.com
    port: 587
    username: buingocdan2005@gmail.com
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB        # Giới hạn 5MB cho 1 file ảnh
      max-request-size: 20MB    # Giới hạn 20MB cho tổng 1 lần đăng tin (nhiều ảnh)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_SECRET}
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  return-url: "http://localhost:8080/real-estate/payment/vnpay-callback"
jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 1800 #second 30 phut
  refresh-duration: 604800 #second 1 tuan